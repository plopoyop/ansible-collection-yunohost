---
# Preseed debconf values for a single package.
# Called from install_packages.yml via include_tasks with yunohost_install_preseed.

# changed_when: false — the debconf module cannot read back password/multiselect
# values, so it always reports changed for those vtypes. These preseeds are only
# consumed during package installation and re-applying them is idempotent.
- name: "Preseed debconf for {{ yunohost_install_preseed.key }}"
  ansible.builtin.debconf:
    name: "{{ yunohost_install_preseed.key }}"
    question: "{{ yunohost_install_debconf_entry.question }}"
    value: "{{ yunohost_install_debconf_entry.value }}"
    vtype: "{{ yunohost_install_debconf_entry.vtype }}"
  loop: "{{ yunohost_install_preseed.value.entries }}"
  loop_control:
    loop_var: yunohost_install_debconf_entry
    label: "{{ yunohost_install_debconf_entry.question }}"
  no_log: "{{ yunohost_install_preseed.value.no_log }}"
  changed_when: false
